name: innova
description: "Innova - Enterprise Web Application"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # WebView
  webview_flutter: ^4.10.0

  # URL Launcher - for external links (tel, mailto, whatsapp, etc.)
  url_launcher: ^6.3.1

  # Connectivity - for offline detection
  connectivity_plus: ^6.1.1

  # Cupertino Icons
  cupertino_icons: ^1.0.8

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # HTTP client
  dio: ^5.7.0

  # Dependency injection
  get_it: ^8.0.3

  # Image picking
  image_picker: ^1.1.2

  # QR scanning
  mobile_scanner: ^7.0.0

  # UUID generation
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  flutter_launcher_icons: ^0.13.1

  # Hive code generation
  hive_generator: ^2.0.1
  build_runner: ^2.4.13

flutter_icons:
  android: true
  ios: true
  image_path: "assets/1024.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
