name: innova
description: "Innova - Enterprise Web Application"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # WebView
  webview_flutter: ^4.10.0

  # URL Launcher - for external links (tel, mailto, whatsapp, etc.)
  url_launcher: ^6.3.1

  # Connectivity - for offline detection
  connectivity_plus: ^6.1.1

  # Cupertino Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  flutter_launcher_icons: ^0.13.1

flutter_icons:
  android: true
  ios: true
  image_path: "assets/1024.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
